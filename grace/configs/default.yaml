data:
  dataset_root: ./DeepEyeNet
  train_csv: train.csv
  valid_csv: valid.csv
  test_csv: test.csv
  image_size: 224
  max_report_len: 160
  max_keywords: 12
  num_workers: 2

model:
  d_model: 256
  num_heads: 8
  decoder_layers: 4
  dropout: 0.2
  fpn_out_channels: 160
  graph_hidden_dim: 256
  graph_layers: 2
  pretrained_backbone: false
  relation_types: [co_occurs, lexical_related]

train:
  seed: 42
  device: cuda
  batch_size: 8
  epochs: 20
  lr: 0.0003
  weight_decay: 0.0001
  grad_clip: 1.0
  clinical_weight_delta: 3.0
  alpha_ce: 1.0
  beta_sem: 0.2
  gamma_kg: 0.2
  early_stop_patience: 5

evaluation:
  mc_dropout_passes: 20
  calibration_bins: 10
  max_gen_len: 160

output_dir: ./outputs
